<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iReiki-dō | Tu Templo & Tu Camino</title>
    <style>
        :root {
            --color-lino: #fcf9f2; 
            --color-texto: #2c2c2c; 
            --color-acento: #8c7a5b; 
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--color-lino);
            font-family: 'Georgia', serif;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        /* Selector de Idioma Minimalista */
        .lang-picker {
            position: absolute; top: 30px; right: 40px;
            font-size: 0.7rem; letter-spacing: 2px; z-index: 100;
        }
        .lang-btn {
            cursor: pointer; color: var(--color-texto);
            opacity: 0.4; transition: all 0.3s;
            margin-left: 15px;
        }
        .lang-btn.active { opacity: 1; font-weight: bold; border-bottom: 1px solid var(--color-acento); }

        .templo-central {
            position: relative; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10;
            text-align: center;
        }

        /* EFECTO REVELADO ORGÁNICO SUMI-E (NUEVO) */
        .logo-container {
            max-width: 420px; width: 65vw;
            position: relative; cursor: pointer;
            overflow: hidden;
        }
        .logo-zen {
            width: 100%; height: auto;
            opacity: 0;
            /* Máscara radial que se expande desde el centro */
            mask-image: radial-gradient(circle, black 0%, transparent 10%);
            -webkit-mask-image: radial-gradient(circle, black 0%, transparent 10%);
            mask-size: 0% 0%;
            -webkit-mask-size: 0% 0%;
            mask-repeat: no-repeat;
            -webkit-mask-repeat: no-repeat;
            mask-position: center;
            -webkit-mask-position: center;
            transition: opacity 1.5s ease, -webkit-mask-size 2s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        
        body.loaded .logo-zen {
            opacity: 1;
            mask-size: 300% 300%;
            -webkit-mask-size: 300% 300%;
        }

        h1 {
            color: var(--color-texto); font-weight: 300;
            letter-spacing: 12px; text-transform: uppercase;
            font-size: 1.4rem; margin-top: 35px;
        }

        /* El Concepto de Mi Camino Vívido (Actualizado) */
        .concepto-camino {
            font-size: 1rem; /* Más grande */
            color: var(--color-acento);
            letter-spacing: 3px;
            margin-top: 10px; opacity: 0;
            transition: opacity 2s ease 1s;
        }
        body.loaded .concepto-camino { opacity: 0.8; }

        /* Chakras Revelados */
        .chakras-revelados {
            display: flex; gap: 20px; margin-top: 50px;
            opacity: 0; transform: translateY(10px);
            transition: all 0.8s ease 1.5s; pointer-events: none;
        }

        .templo-central:hover .chakras-revelados {
            opacity: 1; transform: translateY(0); pointer-events: auto;
        }

        .chakra-item { position: relative; display: flex; flex-direction: column; align-items: center; }
        .chakra-dot { width: 52px; transition: all 0.4s ease; filter: grayscale(100%); opacity: 0.5; }
        .chakra-label {
            position: absolute; top: -30px; font-size: 0.6rem;
            color: var(--color-acento); letter-spacing: 2px;
            text-transform: uppercase; opacity: 0; transition: all 0.3s ease;
        }

        .chakra-item:hover .chakra-dot { transform: scale(1.2); filter: grayscale(0%); opacity: 1; }
        .chakra-item:hover .chakra-label { opacity: 1; top: -40px; }

        footer {
            position: absolute; bottom: 30px; width: 100%;
            text-align: center; font-size: 0.65rem; color: var(--color-acento); 
            letter-spacing: 5px; opacity: 0.5;
        }
    </style>
</head>
<body class="loading">

    <div class="lang-picker">
        <span class="lang-btn active" onclick="changeLang('es')">ES</span>
        <span class="lang-btn" onclick="changeLang('en')">EN</span>
        <span class="lang-btn" onclick="changeLang('fr')">FR</span>
    </div>

    <div class="templo-central">
        <div class="logo-container">
            <img src="2.png" alt="iReiki-do Logo" class="logo-zen">
        </div>

        <h1 id="welcome-text">Bienvenida/o a tu Templo</h1>
        <p class="concepto-camino" id="camino-text">iReiki-dō: Mi Camino Vívido de Reiki</p>

        <div class="chakras-revelados">
            <div class="chakra-item"><span class="chakra-label" data-es="Raíz" data-en="Root" data-fr="Racine">Raíz</span><img src="11.png" class="chakra-dot"></div>
            <div class="chakra-item"><span class="chakra-label" data-es="Sacro" data-en="Sacral" data-fr="Sacré">Sacro</span><img src="12.png" class="chakra-dot"></div>
            <div class="chakra-item"><span class="chakra-label" data-es="Plexo" data-en="Plexus" data-fr="Plexus">Plexo</span><img src="13.png" class="chakra-dot"></div>
            <div class="chakra-item"><span class="chakra-label" data-es="Reiki" data-en="Reiki" data-fr="Reiki">Reiki</span><img src="14.png" class="chakra-dot"></div>
            <div class="chakra-item"><span class="chakra-label" data-es="Alquimia" data-en="Alchemy" data-fr="Alchimie">Alquimia</span><img src="15.png" class="chakra-dot"></div>
            <div class="chakra-item"><span class="chakra-label" data-es="Visión" data-en="Vision" data-fr="Vision">Visión</span><img src="16.png" class="chakra-dot"></div>
            <div class="chakra-item"><span class="chakra-label" data-es="Corona" data-en="Crown" data-fr="Couronne">Corona</span><img src="17.png" class="chakra-dot"></div>
        </div>
    </div>

    <footer>IREIKI-DŌ &bull; 2026</footer>

    <script>
        // Iniciar animación al cargar
        window.addEventListener('load', () => {
            setTimeout(() => { document.body.classList.add('loaded'); }, 300);
        });

        const translations = {
            es: { welcome: "Bienvenida/o a tu Templo", camino: "iReiki-dō: Mi Camino Vívido de Reiki" },
            en: { welcome: "Welcome to your Temple", camino: "iReiki-dō: My Living Reiki Path" },
            fr: { welcome: "Bienvenue dans votre Temple", camino: "iReiki-dō: Mon Chemin Reiki Vivant" }
        };

        function changeLang(lang) {
            document.getElementById('welcome-text').innerText = translations[lang].welcome;
            document.getElementById('camino-text').innerText = translations[lang].camino;
            document.querySelectorAll('.chakra-label').forEach(label => {
                label.innerText = label.getAttribute(`data-${lang}`);
            });
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.toLowerCase() === lang) btn.classList.add('active');
            });
        }
    </script>
</body>
</html>
