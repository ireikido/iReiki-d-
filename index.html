<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iReiki-dō | Tu Templo & Tu Camino</title>
    <style>
        :root {
            --color-lino: #fcf9f2; 
            --color-arena: #f0e6d2;
            --color-texto: #3d3428; 
            --color-acento: #8c7a5b;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; min-height: 100%;
            background: radial-gradient(circle at 50% 50%, var(--color-lino) 0%, var(--color-arena) 100%);
            font-family: 'Georgia', serif;
            color: var(--color-texto);
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        /* IDIOMAS */
        .lang-picker { position: fixed; top: 30px; right: 40px; font-size: 0.8rem; letter-spacing: 3px; z-index: 1100; }
        .lang-btn { cursor: pointer; opacity: 0.3; transition: 0.4s; margin-left: 15px; text-transform: uppercase; }
        .lang-btn.active { opacity: 1; font-weight: bold; border-bottom: 1px solid var(--color-acento); }

        /* NAVEGACIÓN LATERAL COLAPSADA */
        .nav-flotante {
            position: fixed; 
            top: 100px; /* Bajado para no chocar con ES EN FR */
            right: -100px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            z-index: 1000; 
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-flotante.visible { right: 40px; }

        .logo-mini { 
            width: 80px; 
            cursor: pointer; 
            z-index: 1010; 
            transition: 0.4s;
        } 

        /* Contenedor de Chakras: Solo se ve al pasar el ratón */
        .chakras-nav { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            margin-top: 20px;
            opacity: 0;
            transform: translateY(-10px);
            pointer-events: none;
            transition: 0.5s ease;
        }

        .nav-flotante:hover .chakras-nav {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .chakra-btn { width: 50px; cursor: pointer; opacity: 0.4; transition: 0.4s; filter: grayscale(100%); } 
        .chakra-btn:hover { opacity: 1; transform: scale(1.1); filter: grayscale(0); }

        /* HERO SECTION */
        .hero { min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; z-index: 10; }
        .templo-central { display: flex; flex-direction: column; align-items: center; text-align: center; }
        .logo-container { max-width: 440px; width: 60vw; animation: breathe 12s infinite ease-in-out; margin-bottom: 20px; }
        @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.04); opacity: 0.9; } }
        h1 { font-weight: 300; letter-spacing: 12px; text-transform: uppercase; font-size: 1.4rem; margin: 20px 0 10px 0; }
        .concepto-camino { font-size: 0.85rem; color: var(--color-acento); letter-spacing: 4px; margin-bottom: 50px; }

        .chakras-main { display: flex; gap: 20px; margin-top: 10px; }
        .chakra-main-item { width: 75px; filter: grayscale(100%); opacity: 0.2; transition: 0.6s; cursor: pointer; }
        .chakra-main-item:hover { filter: grayscale(0%); opacity: 1; transform: scale(1.15); }

        /* SECCIÓN HISTORIA Y SÍMBOLOS */
        .historia { min-height: 110vh; display: flex; align-items: center; justify-content: center; position: relative; padding: 100px 0; }
        .historia p { font-size: 1.6rem; line-height: 2.2; font-style: italic; text-align: center; max-width: 850px; padding: 0 50px; z-index: 5; font-weight: 300; }
        
        .reiki-anim { position: absolute; top: 50%; left: 50%; width: 140px; opacity: 0; transition: 3s ease-out; transform: translate(-50%, -50%); pointer-events: none; }
        .historia.visible .simbolo-sup { opacity: 0.1; transform: translate(-50%, -380px); }
        .historia.visible .simbolo-inf { opacity: 0.1; transform: translate(-50%, 260px); }
        .historia.visible .simbolo-izq { opacity: 0.05; transform: translate(-500px, -50%); }
        .historia.visible .simbolo-der { opacity: 0.05; transform: translate(400px, -50%); }

        /* BOTÓN SUBIR */
        .btn-antigravedad {
            position: fixed; bottom: 30px; right: -80px; 
            width: 45px; height: 45px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; opacity: 0; transition: 0.6s;
            border: 1px solid var(--color-acento); background: rgba(252, 249, 242, 0.9);
            z-index: 1200;
        }
        .btn-antigravedad.visible { right: 40px; opacity: 0.4; }
    </style>
</head>
<body>

    <div class="lang-picker">
        <span class="lang-btn active">ES</span>
        <span class="lang-btn">EN</span>
        <span class="lang-btn">FR</span>
    </div>

    <nav class="nav-flotante" id="nav-flotante">
        <img src="2.png" class="logo-mini" alt="Inicio" onclick="window.scrollTo(0,0)">
        <div class="chakras-nav">
            <img src="11.png" class="chakra-btn" onclick="document.getElementById('section-historia').scrollIntoView()">
            <img src="12.png" class="chakra-btn">
            <img src="13.png" class="chakra-btn">
            <img src="14.png" class="chakra-btn">
            <img src="15.png" class="chakra-btn">
            <img src="16.png" class="chakra-btn">
            <img src="17.png" class="chakra-btn">
        </div>
    </nav>

    <section class="hero">
        <div class="templo-central">
            <div class="logo-container"><img src="2.png" style="width:100%" alt="Logo iReiki-do"></div>
            <h1>Bienvenida/o a tu Templo</h1>
            <p class="concepto-camino">iReiki-dō: El Reiki en mi camino</p>
            <div class="chakras-main">
                <img src="11.png" class="chakra-main-item">
                <img src="12.png" class="chakra-main-item">
                <img src="13.png" class="chakra-main-item">
                <img src="14.png" class="chakra-main-item">
                <img src="15.png" class="chakra-main-item">
                <img src="16.png" class="chakra-main-item">
                <img src="17.png" class="chakra-main-item">
            </div>
        </div>
    </section>

    <section class="historia" id="section-historia">
        <img src="dai-ko-myo.png" class="reiki-anim simbolo-sup">
        <img src="cho-ku-rei.png" class="reiki-anim simbolo-inf">
        <img src="sei-he-ki.png" class="reiki-anim simbolo-izq">
        <img src="hon-sha.png" class="reiki-anim simbolo-der">
        <p>"En iReiki-dō, transformamos nuestra experiencia personal en un refugio para ti. Somos Kike y Silvia, y este es el espacio donde tu evolución energética comienza."</p>
    </section>

    <div class="btn-antigravedad" id="btn-up" onclick="window.scrollTo(0,0)">↑</div>

    <script>
        function handleScroll() {
            const nav = document.getElementById('nav-flotante');
            const btnUp = document.getElementById('btn-up');
            if (window.scrollY > 500) {
                nav.classList.add('visible');
                btnUp.classList.add('visible');
            } else {
                nav.classList.remove('visible');
                btnUp.classList.remove('visible');
            }
        }
        window.addEventListener('scroll', handleScroll);
        window.addEventListener('load', handleScroll);

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('visible');
            });
        }, { threshold: 0.2 });
        observer.observe(document.getElementById('section-historia'));
    </script>
</body>
</html>
