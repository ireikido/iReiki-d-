<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iReiki-dō | Templo de Bienestar</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff; /* Fondo blanco para disimular los logos actuales */
            color: #333;
            font-family: 'Georgia', serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            padding: 60px 20px 20px 20px;
            text-align: center;
        }
        .logo-principal {
            max-width: 220px;
            height: auto;
        }
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
        }
        .templo-box {
            max-width: 600px;
            text-align: center;
        }
        h1 {
            color: #b5935b;
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-size: 1.4rem;
            margin-bottom: 20px;
        }
        p {
            font-style: italic;
            font-size: 1.1rem;
            color: #666;
            line-height: 1.8;
            max-width: 450px;
            margin: 0 auto 40px auto;
        }
        .chakras-nav {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .chakra-dot {
            width: 30px;
            height: auto;
            filter: grayscale(20%); /* Un toque sutil para que no brillen demasiado */
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .chakra-dot:hover {
            filter: grayscale(0%);
            transform: translateY(-5px);
        }
        footer {
            padding: 40px;
            font-size: 0.7rem;
            color: #ccc;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <img src="3.png" alt="iReiki-do Logo" class="logo-principal">
    </header>

    <main>
        <div class="templo-box">
            <h1>Bienvenida/o al Templo</h1>
            <p>Un espacio sagrado para nutrir tu energía vital y encontrar el equilibrio que mereces.</p>
            
            <div class="chakras-nav">
                <img src="11.png" class="chakra-dot" title="Raíz">
                <img src="12.png" class="chakra-dot" title="Sacro">
                <img src="13.png" class="chakra-dot" title="Plexo Solar">
                <img src="14.png" class="chakra-dot" title="Corazón">
                <img src="15.png" class="chakra-dot" title="Garganta">
                <img src="16.png" class="chakra-dot" title="Tercer Ojo">
                <img src="17.png" class="chakra-dot" title="Corona">
            </div>
        </div>
    </main>

    <footer>
        iReiki-dō &bull; Est. 2026
    </footer>

</body>
</html>
