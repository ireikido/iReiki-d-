<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iReiki-dō | Tu Templo & Tu Camino</title>
    <style>
        :root {
            --color-lino: #fcf9f2; 
            --color-arena: #f0e6d2;
            --color-texto: #3d3428; 
            --color-acento: #8c7a5b;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; min-height: 100%;
            background: radial-gradient(circle at 50% 50%, var(--color-lino) 0%, var(--color-arena) 100%);
            font-family: 'Georgia', serif;
            color: var(--color-texto);
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        /* IDIOMAS */
        .lang-picker { position: fixed; top: 30px; right: 40px; font-size: 0.8rem; letter-spacing: 3px; z-index: 1100; }
        .lang-btn { cursor: pointer; opacity: 0.3; transition: 0.4s; margin-left: 15px; text-transform: uppercase; }
        .lang-btn.active { opacity: 1; font-weight: bold; border-bottom: 1px solid var(--color-acento); }

        /* NAVEGACIÓN LATERAL (OCULTA POR DEFECTO) */
        .nav-flotante {
            position: fixed; top: 100px; right: 40px;
            display: flex; flex-direction: column; align-items: center;
            z-index: 1000; opacity: 0; transition: 0.8s ease-in-out; pointer-events: none;
        }
        .nav-flotante.visible { opacity: 1; pointer-events: auto; }
        .logo-mini { width: 100px; cursor: pointer; } 
        
        .chakras-nav { display: flex; flex-direction: column; gap: 20px; margin-top: 40px; }
        .chakra-btn-container { position: relative; display: flex; align-items: center; justify-content: flex-end; }
        .chakra-btn { width: 60px; cursor: pointer; opacity: 0.4; transition: 0.4s; filter: grayscale(100%); } 
        .chakra-btn:hover { opacity: 1; transform: scale(1.1); filter: grayscale(0); }
        .label-nav { position: absolute; right: 75px; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 3px; opacity: 0; transition: 0.3s; white-space: nowrap; color: var(--color-acento); }
        .chakra-btn-container:hover .label-nav { opacity: 1; }

        /* HERO SECTION & LATIDO LENTO */
        .hero { min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; z-index: 10; }
        .templo-central { display: flex; flex-direction: column; align-items: center; text-align: center; }
        .logo-container { 
            max-width: 440px; width: 60vw; 
            animation: breathe 8s infinite ease-in-out; /* Velocidad reducida a la mitad */
            margin-bottom: 20px; 
        }
        @keyframes breathe { 
            0%, 100% { transform: scale(1); } 
            50% { transform: scale(1.04); } 
        }
        
        h1 { font-weight: 300; letter-spacing: 12px; text-transform: uppercase; font-size: 1.5rem; margin: 20px 0 10px 0; }
        .concepto-camino { font-size: 0.9rem; color: var(--color-acento); letter-spacing: 4px; margin-bottom: 80px; }

        .chakras-main { display: flex; gap: 25px; }
        .chakra-main-item-wrapper { position: relative; display: flex; flex-direction: column; align-items: center; }
        .chakra-main-item { width: 80px; filter: grayscale(100%); opacity: 0.2; transition: 0.5s; cursor: pointer; }
        .chakra-main-item:hover { filter: grayscale(0%); opacity: 1; transform: scale(1.1); }

        /* HISTORIA */
        .historia { min-height: 120vh; display: flex; align-items: center; justify-content: center; position: relative; padding: 100px 0; }
        .historia p { font-size: 1.7rem; line-height: 2.3; font-style: italic; text-align: center; max-width: 900px; padding: 0 50px; z-index: 5; font-weight: 300; }

        /* BOTÓN SUBIR */
        .btn-antigravedad {
            position: fixed; bottom: 30px; right: 30px;
            width: 50px; height: 50px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; opacity: 0; transition: 0.4s;
            border: 1px solid var(--color-texto); background: rgba(252, 249, 242, 0.8);
            z-index: 1200; pointer-events: none;
        }
        .btn-antigravedad.visible { opacity: 0.3; pointer-events: auto; }
    </style>
</head>
<body>

    <div class="lang-picker">
        <span class="lang-btn active">ES</span>
        <span class="lang-btn">EN</span>
        <span class="lang-btn">FR</span>
    </div>

    <nav class="nav-flotante" id="nav-flotante">
        <img src="2.png" class="logo-mini" onclick="window.scrollTo(0,0)">
        <div class="chakras-nav">
            <div class="chakra-btn-container"><span class="label-nav">Raíz</span><img src="11.png" class="chakra-btn" onclick="document.getElementById('section-historia').scrollIntoView()"></div>
            <div class="chakra-btn-container"><span class="label-nav">Sacro</span><img src="12.png" class="chakra-btn"></div>
            <div class="chakra-btn-container"><span class="label-nav">Plexo</span><img src="13.png" class="chakra-btn"></div>
            <div class="chakra-btn-container"><span class="label-nav">Corazón</span><img src="14.png" class="chakra-btn"></div>
            <div class="chakra-btn-container"><span class="label-nav">Garganta</span><img src="15.png" class="chakra-btn"></div>
            <div class="chakra-btn-container"><span class="label-nav">Tercer Ojo</span><img src="16.png" class="chakra-btn"></div>
            <div class="chakra-btn-container"><span class="label-nav">Corona</span><img src="17.png" class="chakra-btn"></div>
        </div>
    </nav>

    <section class="hero">
        <div class="templo-central">
            <div class="logo-container"><img src="2.png" style="width:100%"></div>
            <h1>Bienvenida/o a tu Templo</h1>
            <p class="concepto-camino">iReiki-dō: El Reiki en mi camino</p>
            <div class="chakras-main">
                <div class="chakra-main-item-wrapper"><img src="11.png" class="chakra-main-item" onclick="document.getElementById('section-historia').scrollIntoView()"></div>
                <div class="chakra-main-item-wrapper"><img src="12.png" class="chakra-main-item"></div>
                <div class="chakra-main-item-wrapper"><img src="13.png" class="chakra-main-item"></div>
                <div class="chakra-main-item-wrapper"><img src="14.png" class="chakra-main-item"></div>
                <div class="chakra-main-item-wrapper"><img src="15.png" class="chakra-main-item"></div>
                <div class="chakra-main-item-wrapper"><img src="16.png" class="chakra-main-item"></div>
                <div class="chakra-main-item-wrapper"><img src="17.png" class="chakra-main-item"></div>
            </div>
        </div>
    </section>

    <section class="historia" id="section-historia">
        <p>"En iReiki-dō, transformamos nuestra experiencia personal en un refugio para ti. Somos Kike y Silvia, y este es el espacio donde tu evolución energética comienza."</p>
    </section>

    <div class="btn-antigravedad" id="btn-up" onclick="window.scrollTo(0,0)">↑</div>

    <script>
        const navFlotante = document.getElementById('nav-flotante');
        const btnUp = document.getElementById('btn-up');

        window.onscroll = function() {
            // Solo muestra el menú lateral y el botón subir después de bajar 400px
            if (window.scrollY > 400) {
                navFlotante.classList.add('visible');
                btnUp.classList.add('visible');
            } else {
                navFlotante.classList.remove('visible');
                btnUp.classList.remove('visible');
            }
        };
    </script>
</body>
</html>
