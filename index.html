<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iReiki-dō | Tu Templo & Tu Camino</title>
    <style>
        :root {
            --color-lino: #fcf9f2; 
            --color-arena: #f0e6d2;
            --color-tierra-suave: #dccbb0;
            --color-texto: #3d3428; 
            --color-acento: #8c7a5b; 
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, var(--color-lino) 0%, var(--color-arena) 100%);
            font-family: 'Georgia', serif;
            color: var(--color-texto);
            scroll-behavior: smooth;
        }

        /* CAPA DE AURA SUTIL */
        .aura-tierra {
            position: fixed; width: 150%; height: 150%;
            background: radial-gradient(circle, var(--color-tierra-suave) 0%, transparent 60%);
            opacity: 0.12; z-index: 1; pointer-events: none;
            animation: drift 25s infinite alternate ease-in-out;
        }
        @keyframes drift { from { transform: translate(-5%, -5%); } to { transform: translate(5%, 5%); } }

        .lang-picker {
            position: fixed; top: 30px; right: 40px;
            font-size: 0.7rem; letter-spacing: 3px; z-index: 100;
        }
        .lang-btn { cursor: pointer; opacity: 0.4; transition: 0.4s; margin-left: 15px; }
        .lang-btn.active { opacity: 1; font-weight: bold; border-bottom: 1px solid var(--color-acento); }

        /* SECCIÓN HERO (ALTURA COMPLETA) */
        .hero {
            height: 100vh; display: flex; align-items: center; justify-content: center;
            position: relative; z-index: 10;
        }

        .templo-central { display: flex; flex-direction: column; align-items: center; text-align: center; }

        /* RESPIRACIÓN DEL LOGO */
        .logo-container {
            max-width: 440px; width: 68vw;
            position: relative; cursor: pointer;
            animation: breathe 8s infinite cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes breathe {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 5px 10px rgba(61, 52, 40, 0.05)); }
            50% { transform: scale(1.04); filter: drop-shadow(0 15px 35px rgba(140, 122, 91, 0.25)); }
        }
        .logo-zen { width: 100%; height: auto; }

        h1 { font-weight: 300; letter-spacing: 14px; text-transform: uppercase; font-size: 1.3rem; margin-top: 40px; }
        .concepto-camino { font-size: 1rem; color: var(--color-acento); letter-spacing: 3px; margin-top: 12px; opacity: 0.8; }

        /* MENÚ RAÍZ DE CHAKRAS (REVELADO FINO) */
        .chakras-revelados {
            display: flex; gap: 25px; margin-top: 60px;
            opacity: 0; transform: translateY(15px);
            transition: all 1.2s cubic-bezier(0.2, 1, 0.3, 1);
            pointer-events: none;
        }
        .templo-central:hover .chakras-revelados { opacity: 1; transform: translateY(0); pointer-events: auto; }

        .chakra-item { display: flex; flex-direction: column; align-items: center; position: relative; }
        .chakra-dot { width: 55px; filter: grayscale(100%); opacity: 0.3; transition: 0.5s ease; }
        .chakra-label {
            position: absolute; top: -35px; font-size: 0.55rem;
            color: var(--color-acento); letter-spacing: 4px; /* Espaciado elegante */
            text-transform: uppercase; opacity: 0; transition: 0.4s;
            white-space: nowrap;
        }
        .chakra-item:hover .chakra-dot { transform: scale(1.15); filter: grayscale(0%); opacity: 1; }
        .chakra-item:hover .chakra-label { opacity: 1; top: -45px; }

        /* SECCIÓN HISTORIA (AL HACER SCROLL) */
        .historia {
            padding: 120px 20px; max-width: 800px; margin: 0 auto;
            text-align: center; position: relative; z-index: 10;
        }
        .historia p { font-size: 1.2rem; font-style: italic; color: var(--color-acento); line-height: 2; }
    </style>
</head>
<body>

    <div class="aura-tierra"></div>

    <div class="lang-picker">
        <span class="lang-btn active" onclick="changeLang('es')">ES</span>
        <span class="lang-btn" onclick="changeLang('en')">EN</span>
    </div>

    <section class="hero">
        <div class="templo-central">
            <div class="logo-container">
                <img src="2.png" alt="iReiki-do Logo" class="logo-zen">
            </div>
            <h1 id="welcome-text">Bienvenida/o a tu Templo</h1>
            <p class="concepto-camino" id="camino-text">iReiki-dō: Evolucionando a cada paso</p>

            <div class="chakras-revelados">
                <div class="chakra-item"><span class="chakra-label">Raíz</span><img src="11.png" class="chakra-dot"></div>
                <div class="chakra-item"><span class="chakra-label">Sacro</span><img src="12.png" class="chakra-dot"></div>
                <div class="chakra-item"><span class="chakra-label">Plexo</span><img src="13.png" class="chakra-dot"></div>
                <div class="chakra-item"><span class="chakra-label">Reiki</span><img src="14.png" class="chakra-dot"></div>
                <div class="chakra-item"><span class="chakra-label">Alquimia</span><img src="15.png" class="chakra-dot"></div>
                <div class="chakra-item"><span class="chakra-label">Visión</span><img src="16.png" class="chakra-dot"></div>
                <div class="chakra-item"><span class="chakra-label">Corona</span><img src="17.png" class="chakra-dot"></div>
            </div>
        </div>
    </section>

    <section class="historia">
        <p id="historia-text">"Dos caminos que se cruzan, una misma energía que fluye. Kike y Silvia: compartiendo el despertar del Templo."</p>
    </section>

    <script>
        function changeLang(lang) {
            const texts = {
                es: { welcome: "Bienvenida/o a tu Templo", camino: "iReiki-dō: Evolucionando a cada paso" },
                en: { welcome: "Welcome to your Temple", camino: "iReiki-dō: Evolving with every step" }
            };
            document.getElementById('welcome-text').innerText = texts[lang].welcome;
            document.getElementById('camino-text').innerText = texts[lang].camino;
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.toLowerCase() === lang) btn.classList.add('active');
            });
        }
    </script>
</body>
</html>
