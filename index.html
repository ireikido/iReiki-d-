<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iReiki-dō | Templo de Bienestar</title>
    <style>
        :root {
            /* Colores extraídos de vuestra paleta zen */
            --color-aura1: rgba(212, 175, 55, 0.1); /* Oro suave */
            --color-aura2: rgba(181, 147, 91, 0.1); /* Arena */
            --color-aura3: rgba(255, 255, 255, 0.8); /* Luz pura */
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #fdfaf6;
            color: #4a4a4a;
            font-family: 'Georgia', serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Luces de energía más sutiles y armónicas */
        .aura {
            position: absolute;
            width: 80vw;
            height: 80vw;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            animation: move 25s infinite alternate ease-in-out;
        }
        .aura-1 { background: var(--color-aura1); top: -20%; left: -10%; }
        .aura-2 { background: var(--color-aura2); bottom: -20%; right: -10%; animation-delay: -7s; }

        @keyframes move {
            from { transform: translate(0, 0) rotate(0deg); }
            to { transform: translate(150px, 50px) rotate(30deg); }
        }

        header {
            padding: 80px 20px 40px 20px;
            text-align: center;
        }

        .logo-principal {
            max-width: 300px;
            height: auto;
            animation: breathe 8s infinite ease-in-out;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 5px rgba(181, 147, 91, 0.1)); }
            50% { transform: scale(1.02); filter: drop-shadow(0 0 15px rgba(181, 147, 91, 0.2)); }
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 0 20px;
            z-index: 1;
        }

        h1 {
            color: #b5935b;
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-size: 1.2rem;
            margin-top: 20px;
        }

        /* Recuperamos los 7 chakras con etiquetas */
        .chakras-nav {
            display: flex;
            gap: 15px;
            margin-top: 60px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .chakra-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .chakra-dot {
            width: 40px;
            height: auto;
            transition: all 0.4s ease;
            cursor: pointer;
        }

        .chakra-label {
            position: absolute;
            bottom: -35px;
            font-size: 0.6rem;
            color: #b5935b;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 0.3s;
            white-space: nowrap;
        }

        .chakra-container:hover .chakra-dot {
            transform: translateY(-8px) scale(1.15);
        }

        .chakra-container:hover .chakra-label {
            opacity: 1;
        }

        footer {
            padding: 40px;
            font-size: 0.7rem;
            color: #b5935b;
            letter-spacing: 3px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="aura aura-1"></div>
    <div class="aura aura-2"></div>

    <header>
        <img src="3.png" alt="iReiki-do Logo" class="logo-principal">
    </header>

    <main>
        <h1>Bienvenida/o al Templo</h1>
        
        <div class="chakras-nav">
            <div class="chakra-container">
                <img src="11.png" class="chakra-dot">
                <span class="chakra-label">Raíz</span>
            </div>
            <div class="chakra-container">
                <img src="12.png" class="chakra-dot">
                <span class="chakra-label">Sacro</span>
            </div>
            <div class="chakra-container">
                <img src="13.png" class="chakra-dot">
                <span class="chakra-label">Plexo</span>
            </div>
            <div class="chakra-container">
                <img src="14.png" class="chakra-dot">
                <span class="chakra-label">Reiki</span>
            </div>
            <div class="chakra-container">
                <img src="15.png" class="chakra-dot">
                <span class="chakra-label">Alquimia</span>
            </div>
            <div class="chakra-container)
                <img src="16.png" class="chakra-dot">
                <span class="chakra-label">Tercer Ojo</span>
            </div>
            <div class="chakra-container">
                <img src="17.png" class="chakra-dot">
                <span class="chakra-label">Corona</span>
            </div>
        </div>
    </main>

    <footer>
        iReiki-dō &bull; Est. 2026
    </footer>

</body>
</html>
