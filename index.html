<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iReiki-dō | Templo de Bienestar</title>
    <style>
        :root {
            --color-aura1: rgba(212, 175, 55, 0.15); 
            --color-aura2: rgba(181, 147, 91, 0.2); 
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #fcf9f2; /* Un tono más arena de base */
            color: #4a4a4a;
            font-family: 'Georgia', serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Luces más presentes */
        .aura {
            position: absolute;
            width: 100vw;
            height: 100vh;
            filter: blur(100px);
            z-index: -1;
            animation: move 20s infinite alternate ease-in-out;
        }
        .aura-1 { background: var(--color-aura1); top: -10%; left: -10%; }
        .aura-2 { background: var(--color-aura2); bottom: -10%; right: -10%; animation-delay: -5s; }

        @keyframes move {
            from { transform: scale(1) translate(0, 0); }
            to { transform: scale(1.1) translate(50px, 50px); }
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Todo al centro */
            text-align: center;
            padding: 20px;
        }

        .logo-principal {
            max-width: 450px; /* Tamaño imponente */
            width: 80%;
            height: auto;
            margin-bottom: 20px;
            animation: breathe 8s infinite ease-in-out;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(181, 147, 91, 0.1)); }
            50% { transform: scale(1.04); filter: drop-shadow(0 0 25px rgba(181, 147, 91, 0.3)); }
        }

        h1 {
            color: #b5935b;
            font-weight: 300;
            letter-spacing: 10px; /* Más aire entre letras para lujo */
            text-transform: uppercase;
            font-size: 1.8rem; /* Más grande */
            margin: 40px 0;
        }

        .chakras-nav {
            display: flex;
            gap: 25px; /* Más separación */
            margin-top: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .chakra-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .chakra-dot {
            width: 60px; /* Mucho más grandes y visibles */
            height: auto;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .chakra-label {
            position: absolute;
            bottom: -40px;
            font-size: 0.7rem;
            color: #b5935b;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0;
            transition: all 0.3s;
        }

        .chakra-container:hover .chakra-dot {
            transform: translateY(-15px) scale(1.3);
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
        }

        .chakra-container:hover .chakra-label {
            opacity: 1;
            bottom: -30px;
        }

        footer {
            padding: 30px;
            font-size: 0.8rem;
            color: #b5935b;
            letter-spacing: 4px;
            text-align: center;
        }

        /* Ajuste para móviles */
        @media (max-width: 600px) {
            .logo-principal { max-width: 280px; }
            h1 { font-size: 1.2rem; letter-spacing: 5px; }
            .chakra-dot { width: 45px; }
        }
    </style>
</head>
<body>

    <div class="aura aura-1"></div>
    <div class="aura aura-2"></div>

    <main>
        <img src="3.png" alt="iReiki-do Logo" class="logo-principal">
        
        <h1>Bienvenida/o al Templo</h1>
        
        <div class="chakras-nav">
            <div class="chakra-container">
                <img src="11.png" class="chakra-dot">
                <span class="chakra-label">Raíz</span>
            </div>
            <div class="chakra-container">
                <img src="12.png" class="chakra-dot">
                <span class="chakra-label">Sacro</span>
            </div>
            <div class="chakra-container">
                <img src="13.png" class="chakra-dot">
                <span class="chakra-label">Plexo</span>
            </div>
            <div class="chakra-container">
                <img src="14.png" class="chakra-dot">
                <span class="chakra-label">Reiki</span>
            </div>
            <div class="chakra-container">
                <img src="15.png" class="chakra-dot">
                <span class="chakra-label">Alquimia</span>
            </div>
            <div class="chakra-container">
                <img src="16.png" class="chakra-dot">
                <span class="chakra-label">Visión</span>
            </div>
            <div class="chakra-container">
                <img src="17.png" class="chakra-dot">
                <span class="chakra-label">Corona</span>
            </div>
        </div>
    </main>

    <footer>
        iReiki-dō &bull; Est. 2026
    </footer>

</body>
</html>
