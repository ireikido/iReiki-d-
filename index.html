<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iReiki-dō | Tu Templo & Tu Camino</title>
    <style>
        :root {
            --color-lino: #fcf9f2; 
            --color-arena: #f0e6d2;
            --color-tierra-suave: #dccbb0;
            --color-texto: #3d3428; 
            --color-acento: #8c7a5b;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; min-height: 100%;
            background: radial-gradient(circle at 50% 50%, var(--color-lino) 0%, var(--color-arena) 100%);
            font-family: 'Georgia', serif;
            color: var(--color-texto);
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        /* NAVEGACIÓN FLOTANTE (ANTIGRAVEDAD) */
        .nav-flotante {
            position: fixed; top: 30px; left: 30px;
            display: flex; flex-direction: column; align-items: center;
            z-index: 1000; opacity: 0; transition: 0.8s; pointer-events: none;
        }
        .nav-flotante.visible { opacity: 1; pointer-events: auto; }

        .logo-mini { width: 50px; cursor: pointer; filter: drop-shadow(0 0 10px rgba(0,0,0,0.05)); }
        
        .chakras-nav {
            display: flex; flex-direction: column; gap: 15px; margin-top: 20px;
            transform: translateY(-20px); opacity: 0; transition: 0.5s;
        }
        .nav-flotante:hover .chakras-nav { transform: translateY(0); opacity: 1; }

        .chakra-btn { width: 35px; cursor: pointer; opacity: 0.4; transition: 0.4s; }
        .chakra-btn:hover { opacity: 1; transform: scale(1.2); filter: grayscale(0); }

        /* HERO SECTION */
        .hero { min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; z-index: 10; }
        .templo-central { display: flex; flex-direction: column; align-items: center; text-align: center; }
        .logo-container { max-width: 440px; width: 60vw; animation: breathe 8s infinite ease-in-out; }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
        
        .chakras-main { display: flex; gap: 30px; margin-top: 50px; opacity: 0; transform: translateY(20px); transition: 1s; }
        .templo-central:hover .chakras-main { opacity: 1; transform: translateY(0); }
        
        .chakra-main-item { width: 85px; filter: grayscale(100%); opacity: 0.25; transition: 0.5s; cursor: pointer; }
        .chakra-main-item:hover { filter: grayscale(0%); opacity: 1; transform: scale(1.15); }

        /* SECCIÓN HISTORIA / REFUGIO */
        .historia { min-height: 120vh; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding: 100px 0; }
        .historia p { font-size: 1.7rem; line-height: 2.3; font-style: italic; text-align: center; max-width: 900px; padding: 0 50px; z-index: 5; }

        /* SÍMBOLOS REIKI EXPANSIÓN */
        .reiki-anim { position: absolute; top: 50%; left: 50%; width: 140px; opacity: 0; transition: 2.5s cubic-bezier(0.16, 1, 0.3, 1); transform: translate(-50%, -50%) scale(0.2); pointer-events: none; }
        .historia.visible .simbolo-sup { opacity: 0.15; transform: translate(-50%, -400px) scale(1); }
        .historia.visible .simbolo-inf { opacity: 0.15; transform: translate(-50%, 280px) scale(1.2); }
        .historia.visible .simbolo-izq { opacity: 0.07; transform: translate(-650px, -50%) scale(1.5) rotate(-10deg); }
        .historia.visible .simbolo-der { opacity: 0.07; transform: translate(500px, -50%) scale(1.5) rotate(10deg); }

        /* BOTÓN ANTIGRAVEDAD ABAJO */
        .btn-antigravedad {
            position: fixed; bottom: 30px; right: 30px;
            background: white; border-radius: 50%; width: 45px; height: 45px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer;
            z-index: 1000; opacity: 0.3; transition: 0.4s;
        }
        .btn-antigravedad:hover { opacity: 1; transform: translateY(-5px); }

    </style>
</head>
<body>

    <nav class="nav-flotante" id="nav-flotante">
        <img src="2.png" class="logo-mini" onclick="window.scrollTo(0,0)">
        <div class="chakras-nav">
            <img src="11.png" class="chakra-btn" onclick="document.getElementById('section-historia').scrollIntoView()">
            <img src="12.png" class="chakra-btn">
            <img src="13.png" class="chakra-btn">
            <img src="14.png" class="chakra-btn">
        </div>
    </nav>

    <section class="hero">
        <div class="templo-central">
            <div class="logo-container"><img src="2.png" class="logo-zen" style="width:100%"></div>
            <h1>Bienvenida/o a tu Templo</h1>
            <p style="color:var(--color-acento); letter-spacing:3px; margin-top:10px">iReiki-dō: El Reiki en mi camino</p>

            <div class="chakras-main">
                <img src="11.png" class="chakra-main-item" onclick="document.getElementById('section-historia').scrollIntoView()">
                <img src="12.png" class="chakra-main-item">
                <img src="13.png" class="chakra-main-item">
                <img src="14.png" class="chakra-main-item">
                <img src="15.png" class="chakra-main-item">
                <img src="16.png" class="chakra-main-item">
                <img src="17.png" class="chakra-main-item">
            </div>
        </div>
    </section>

    <section class="historia" id="section-historia">
        <img src="dai-ko-myo.png" class="reiki-anim simbolo-sup">
        <img src="cho-ku-rei.png" class="reiki-anim simbolo-inf">
        <img src="sei-he-ki.png" class="reiki-anim simbolo-izq">
        <img src="hon-sha.png" class="reiki-anim simbolo-der">
        <p>"En iReiki-dō, transformamos nuestra experiencia personal en un refugio para ti. Somos Kike y Silvia, y este es el espacio donde tu evolución energética comienza."</p>
    </section>

    <div class="btn-antigravedad" onclick="window.scrollTo(0,0)">↑</div>

    <script>
        const historiaSec = document.getElementById('section-historia');
        const navFlotante = document.getElementById('nav-flotante');

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    navFlotante.classList.add('visible'); // Aparece el menú lateral al bajar
                } else if (window.scrollY < 100) {
                    navFlotante.classList.remove('visible'); // Desaparece al estar arriba del todo
                }
            });
        }, { threshold: 0.2 });

        observer.observe(historiaSec);
    </script>
</body>
</html>
