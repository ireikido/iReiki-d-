<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iReiki-dō | Templo de Bienestar</title>
    <style>
        :root {
            --color-oro: #b5935b;
            --color-arena-aura: rgba(181, 147, 91, 0.25);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #fcf9f2;
            font-family: 'Georgia', serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Fondo de energía envolvente */
        .aura {
            position: absolute;
            width: 120vw;
            height: 120vh;
            background: radial-gradient(circle, var(--color-arena-aura) 0%, transparent 70%);
            filter: blur(80px);
            z-index: -1;
            animation: pulse-bg 15s infinite alternate ease-in-out;
        }

        @keyframes pulse-bg {
            from { transform: scale(1); opacity: 0.5; }
            to { transform: scale(1.2); opacity: 0.8; }
        }

        /* Contenedor sagrado centrado */
        .templo-central {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        /* Logo Central Palpitante */
        .logo-trigger {
            max-width: 450px;
            width: 70vw;
            cursor: pointer;
            z-index: 20;
            transition: all 0.5s ease;
            animation: breathe 6s infinite ease-in-out;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(181, 147, 91, 0.2)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 30px rgba(181, 147, 91, 0.4)); }
        }

        h1 {
            color: var(--color-oro);
            font-weight: 300;
            letter-spacing: 12px;
            text-transform: uppercase;
            font-size: 1.5rem;
            margin-top: 30px;
            opacity: 0.8;
            pointer-events: none;
        }

        /* Contenedor de Chakras Ocultos */
        .chakras-revelados {
            display: flex;
            gap: 20px;
            margin-top: 40px;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        /* El truco: al pasar el ratón por el logo o el texto, aparecen los chakras */
        .templo-central:hover .chakras-revelados {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .templo-central:hover .logo-trigger {
            transform: scale(0.9); /* Se hace un poco más pequeño para dejar espacio */
        }

        .chakra-dot {
            width: 55px;
            height: auto;
            transition: all 0.4s ease;
            cursor: pointer;
            filter: grayscale(30%);
        }

        .chakra-dot:hover {
            transform: scale(1.3) translateY(-10px);
            filter: grayscale(0%) drop-shadow(0 5px 15px rgba(0,0,0,0.1));
        }

        footer {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            font-size: 0.7rem;
            color: var(--color-oro);
            letter-spacing: 4px;
        }

        /* Responsivo para móviles */
        @media (max-width: 600px) {
            .logo-trigger { max-width: 280px; }
            h1 { font-size: 1rem; letter-spacing: 6px; }
            .chakra-dot { width: 40px; }
            .chakras-revelados { gap: 10px; }
        }
    </style>
</head>
<body>

    <div class="aura"></div>

    <div class="templo-central">
        <img src="3.png" alt="iReiki-do Logo" class="logo-trigger">
        
        <h1>Bienvenida/o al Templo</h1>

        <div class="chakras-revelados">
            <img src="11.png" class="chakra-dot" title="Raíz">
            <img src="12.png" class="chakra-dot" title="Sacro">
            <img src="13.png" class="chakra-dot" title="Plexo">
            <img src="14.png" class="chakra-dot" title="Reiki">
            <img src="15.png" class="chakra-dot" title="Alquimia">
            <img src="16.png" class="chakra-dot" title="Visión">
            <img src="17.png" class="chakra-dot" title="Corona">
        </div>
    </div>

    <footer>
        IREIKI-DŌ &bull; EST. 2026
    </footer>

</body>
</html>
